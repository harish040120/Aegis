services:
  backend-hub:
    build:
      context: ../backend-hub
      dockerfile: ../../docker/backend-hub/Dockerfile
    container_name: aegis-backend-hub
    environment:
      PORT: 3015
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-demo}
      WAQI_API_KEY: ${WAQI_API_KEY:-demo}
    ports:
      - "3015:3015"

  model-backend:
    build:
      context: ../model-backend/backend
      dockerfile: ../../docker/model-backend/Dockerfile
    container_name: aegis-model-backend
    environment:
      PORT: 8010
      DATABASE_URL: ${DATABASE_URL}
      DATA_HUB_URL: http://backend-hub:3015/api/risk-data
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-demo}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    ports:
      - "8010:8010"
    depends_on:
      - backend-hub

  frontend-admin:
    build:
      context: ../frontend-admin
      dockerfile: ../../docker/frontend-admin/Dockerfile
    container_name: aegis-admin-dashboard
    ports:
      - "2000:2000"
    depends_on:
      - model-backend
