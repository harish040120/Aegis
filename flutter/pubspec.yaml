name: aegis
description: Aegis - Parametric Insurance for Gig Workers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  flutter_secure_storage: ^9.0.0
  geolocator: ^11.0.0
  device_info_plus: ^10.1.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  geocoding: ^3.0.0
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/main_logo.png
